<!DOCTYPE html>
<html lang=uk>
<head>
    <meta charset=UTF-8>
    <meta name=viewport content=width=device-width, initial-scale=1.0>
    <meta name=description content=Контакти автора портфоліо>
    <meta name=author content=Літвінов Артем Олександрович>
    <title>Контакти — Портфоліо</title>
</head>
<body>
    <header>
        <h1>Контакти</h1>

        <nav>
            <ul>
                <li><a href=index.html>Головна</a></li>
                <li><a href=about.html>Про мене</a></li>
                <li><a href=projects.html>Проєкти</a></li>
                <li><strong>Контакти</strong></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Зв'язок</h2>

            <address>
                <p>Email: <a href=mailto:a.o.lytvynov@student.khai.edu>a.o.lytvynov@student.khai.edu</a></p>
                <p>Телефон: <a href=tel:+380000000000>+38 (000) 000-00-00</a></p>
            </address>
        </section>

        <section>
            <h2>Форма</h2>

            <form action=# method=post>
                <fieldset>
                    <legend>Контактні дані</legend>

                    <p>
                        <label for=name>Ім'я:</label>
                        <input type=text id=name name=name placeholder=Ваше ім'я required>
                    </p>

                    <p>
                        <label for=email>Email:</label>
                        <input type=email id=email name=email placeholder=email@example.com required>
                    </p>
                </fieldset>

                <fieldset>
                    <legend>Повідомлення</legend>

                    <p>
                        <label for=subject>Тема:</label>
                        <select id=subject name=subject required>
                            <option value=">Оберіть тему</option>
 <option value=question>Питання</option>
 <option value=cooperation>Співпраця</option>
 <option value=feedback>Відгук</option>
 </select>
 </p>

 <p>Тип звернення:</p>

 <p>
 <input type=radio id=type-question name=type value=question required>
 <label for=type-question>Питання</label>
 </p>

 <p>
 <input type=radio id=type-suggestion name=type value=suggestion>
 <label for=type-suggestion>Пропозиція</label>
 </p>

 <p>
 <input type=radio id=type-complaint name=type value=complaint>
 <label for=type-complaint>Скарга</label>
 </p>

 <p>
 <label for=message>Повідомлення:</label>
 </p>

 <p>
 <textarea id=message name=message rows=6 cols=45 placeholder=Ваше повідомлення required></textarea>
 </p>
 </fieldset>

 <fieldset>
 <legend>Згода</legend>

 <p>
 <input type=checkbox id=consent name=consent required>
 <label for=consent>Я погоджуюсь на обробку даних</label>
 </p>
 </fieldset>

 <p>
 <button type=submit>Надіслати</button>
 </p>
 </form>
 </section>

 <aside>
 <h2>Примітка</h2>
 <p>Форма створена для прикладу і не надсилає дані на сервер.</p>
 </aside>
 </main>

 <footer>
 <p>&copy; 2026 Літвінов Артем Олександрович</p>
 </footer>
</body>
</html>
